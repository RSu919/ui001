<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>實驗數據管理後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen p-8">
  <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl p-10">

    <h1 class="text-3xl font-extrabold text-slate-800 mb-1">📊 實驗數據管理後台</h1>
    <p class="text-slate-500 mb-2 text-sm">2 × 3 實驗設計（方向 × 錯誤率）｜36 題 / 受試者</p>
    <div class="border-b pb-4 mb-8 flex gap-3 text-xs text-slate-400 flex-wrap">
      <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded font-medium">OW_10：單向 10%</span>
      <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded font-medium">OW_20：單向 20%</span>
      <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded font-medium">OW_30：單向 30%</span>
      <span class="bg-amber-100 text-amber-700 px-2 py-1 rounded font-medium">TW_10：雙向 10%</span>
      <span class="bg-amber-100 text-amber-700 px-2 py-1 rounded font-medium">TW_20：雙向 20%</span>
      <span class="bg-amber-100 text-amber-700 px-2 py-1 rounded font-medium">TW_30：雙向 30%</span>
    </div>

    <!-- 數據概覽 -->
    <div id="summary-box" class="mb-8 hidden">
      <div class="grid grid-cols-3 gap-4 mb-4">
        <div class="bg-blue-50 rounded-xl p-4 text-center">
          <p class="text-2xl font-bold text-blue-700" id="count-total">-</p>
          <p class="text-sm text-blue-500">總筆數</p>
        </div>
        <div class="bg-green-50 rounded-xl p-4 text-center">
          <p class="text-2xl font-bold text-green-700" id="count-participants">-</p>
          <p class="text-sm text-green-500">受試者人數</p>
        </div>
        <div class="bg-purple-50 rounded-xl p-4 text-center">
          <p class="text-2xl font-bold text-purple-700" id="count-complete">-</p>
          <p class="text-sm text-purple-500">完整完成人數（36題）</p>
        </div>
      </div>

      <!-- 各組人數分佈 -->
      <div class="bg-white border border-slate-200 rounded-xl p-5">
        <h3 class="font-bold text-slate-700 mb-3">📊 各組收案進度（目標每組 25 人）</h3>
        <div id="group-progress" class="grid grid-cols-2 md:grid-cols-3 gap-3">
          <!-- 由 JS 動態產生 -->
        </div>
        <p class="text-xs text-slate-400 mt-3">* 僅計算完整完成36題的受試者</p>
      </div>
    </div>

    <!-- 操作按鈕 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
        <h3 class="font-bold text-lg mb-2 text-gray-700">1. 原始數據備份</h3>
        <p class="text-sm text-gray-500 mb-4">包含所有原始欄位，適合進階分析或手動檢查。</p>
        <button onclick="loadAndShow()" class="w-full bg-slate-600 hover:bg-slate-700 text-white font-semibold py-3 rounded-lg transition">
          🔍 載入並預覽數據
        </button>
      </div>

      <div class="bg-blue-50 p-6 rounded-xl border border-blue-200">
        <h3 class="font-bold text-lg mb-2 text-blue-700">2. SPSS 專用清洗檔（推薦）</h3>
        <p class="text-sm text-blue-500 mb-4">自動提取量表分數、轉換欄位、編碼組別，可直接匯入 SPSS。</p>
        <button onclick="downloadSPSSData()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
          📥 下載 SPSS 清洗檔 (.csv)
        </button>
      </div>
    </div>

    <!-- 狀態訊息 -->
    <div id="status-msg" class="mt-6 text-center text-sm font-medium py-3 rounded-lg hidden"></div>

    <!-- 數據預覽表格 -->
    <div id="preview-box" class="mt-8 hidden">
      <h3 class="font-bold text-gray-700 mb-3">數據預覽（前 20 筆）</h3>
      <div class="overflow-x-auto">
        <table id="preview-table" class="text-xs w-full border-collapse">
          <thead class="bg-slate-100 text-slate-600"></thead>
          <tbody class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const supabaseUrl = 'https://gceaxslljccatxvvohtx.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjZWF4c2xsamNjYXR4dnZvaHR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3OTI1ODAsImV4cCI6MjA4NjM2ODU4MH0.QJvdg8gYt_zX8HN7rfylt2UrgNhJ8HeldygRkaVhEX8';
    const _supabase   = supabase.createClient(supabaseUrl, supabaseKey);

    async function fetchAll() {
      const { data, error } = await _supabase
        .from('experiment_results_v2')
        .select('*')
        .order('created_at');
      if (error) throw error;
      return data || [];
    }

    async function loadAndShow() {
      updateStatus('載入中...', 'blue');
      try {
        const data = await fetchAll();
        showSummary(data);
        showPreview(data);
        updateStatus(`共 ${data.length} 筆資料載入完成。`, 'green');
      } catch (err) {
        updateStatus('載入失敗：' + err.message, 'red');
      }
    }

    function showSummary(data) {
      const uniqueUsers   = new Set(data.map(r => r.user_id)).size;
      const trialCounts   = {};
      data.forEach(r => { trialCounts[r.user_id] = (trialCounts[r.user_id] || 0) + 1; });
      const completeCount = Object.values(trialCounts).filter(c => c >= 36).length;

      document.getElementById('count-total').innerText        = data.length;
      document.getElementById('count-participants').innerText = uniqueUsers;
      document.getElementById('count-complete').innerText     = completeCount;

      // 各組完成人數統計
      const TARGET = 25;
      const GROUPS = ['OW_10','OW_20','OW_30','TW_10','TW_20','TW_30'];
      const groupComplete = {};
      GROUPS.forEach(g => groupComplete[g] = 0);

      // 找出每個 user 完成的組別
      const userGroup = {};
      data.forEach(r => {
        if (r.group_id) userGroup[r.user_id] = r.group_id;
      });
      Object.entries(userGroup).forEach(([uid, gid]) => {
        if (trialCounts[uid] >= 36 && groupComplete[gid] !== undefined) {
          groupComplete[gid]++;
        }
      });

      // 渲染進度條
      const container = document.getElementById('group-progress');
      container.innerHTML = GROUPS.map(g => {
        const n    = groupComplete[g] || 0;
        const pct  = Math.min(100, Math.round((n / TARGET) * 100));
        const dir  = g.startsWith('OW') ? '單向' : '雙向';
        const rate = g.endsWith('10') ? '10%' : g.endsWith('20') ? '20%' : '30%';
        const isOW  = g.startsWith('OW');
        const barColor = pct >= 100 ? 'bg-green-500' : isOW ? 'bg-blue-400' : 'bg-amber-400';
        const badge = pct >= 100
          ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">✅ 達標</span>'
          : '';
        return `
          <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
            <div class="flex justify-between items-center mb-1">
              <span class="font-bold text-slate-700">${g}</span>
              ${badge}
            </div>
            <div class="text-xs text-slate-500 mb-2">${dir}錯誤 · ${rate} 錯誤率</div>
            <div class="w-full bg-slate-200 rounded-full h-2 mb-1">
              <div class="${barColor} h-2 rounded-full transition-all" style="width:${pct}%"></div>
            </div>
            <div class="text-right text-sm font-semibold text-slate-600">${n} / ${TARGET} 人</div>
          </div>`;
      }).join('');

      document.getElementById('summary-box').classList.remove('hidden');
    }

    function showPreview(data) {
      const preview = data.slice(0, 20);
      if (!preview.length) return;

      const keys   = Object.keys(preview[0]);
      const thead  = document.querySelector('#preview-table thead');
      const tbody  = document.querySelector('#preview-table tbody');

      thead.innerHTML = '<tr>' + keys.map(k => `<th class="px-2 py-1 text-left whitespace-nowrap">${k}</th>`).join('') + '</tr>';
      tbody.innerHTML = preview.map(row =>
        '<tr>' + keys.map(k => `<td class="px-2 py-1 whitespace-nowrap">${row[k] ?? ''}</td>`).join('') + '</tr>'
      ).join('');

      document.getElementById('preview-box').classList.remove('hidden');
    }

    async function downloadSPSSData() {
      updateStatus('正在進行數據清洗與轉換...', 'blue');
      try {
        const data = await fetchAll();
        if (!data.length) { alert('目前資料庫沒有數據！'); return; }

        // ── 修正1：error_rate_code 改為 10/20/30% 對應 ──
        const directionCode = { 'One-way': 1, 'Two-way': 2 };
        const errorRateCode = { 0.10: 1, 0.20: 2, 0.30: 3 };

        // ── 修正5：計算每位受試者每個 stage 的採納率與平均反應時間 ──
        // 先把所有 trial 資料按 user_id + stage 分組
        const userStageMap = {};
        data.forEach(row => {
          const key = `${row.user_id}__${row.stage}`;
          if (!userStageMap[key]) userStageMap[key] = { agreed: [], rt: [] };
          userStageMap[key].agreed.push(row.agreed_with_ai ? 1 : 0);
          userStageMap[key].rt.push(row.response_time || 0);
        });
        const getAdoptionRate = (uid, stage) => {
          const key = `${uid}__${stage}`;
          const d = userStageMap[key];
          if (!d || !d.agreed.length) return '';
          return (d.agreed.reduce((a,b)=>a+b,0) / d.agreed.length).toFixed(3);
        };
        const getAvgRT = (uid, stage) => {
          const key = `${uid}__${stage}`;
          const d = userStageMap[key];
          if (!d || !d.rt.length) return '';
          return Math.round(d.rt.reduce((a,b)=>a+b,0) / d.rt.length);
        };

        // ── SPSS 欄位定義（更新後完整版）──
        const headers = [
          'user_id',
          'group_id',           // OW_10 / OW_20 / OW_30 / TW_10 / TW_20 / TW_30
          'direction',          // One-way / Two-way
          'direction_code',     // 1=One-way, 2=Two-way
          'error_rate',         // 0.10 / 0.20 / 0.30
          'error_rate_code',    // 1=10%, 2=20%, 3=30%（修正1）
          'stage',
          'trial_number',
          'stimulus_id',
          'is_ai_generated',    // 1/0
          'ai_label',           // AI / Human
          'is_error_trial',     // 1/0
          'error_type',         // false_negative / false_positive / (空)
          'user_choice',        // AI / Human
          'agreed_with_ai',     // 1/0（每題）
          'is_correct',         // 1/0
          'rt_seconds',         // 每題反應時間（秒）
          // ── 量表欄位（每12題一次，其餘題空白）──
          'trust_q1',
          'trust_q2',
          'trust_q3',
          'trust_q4',
          'trust_avg',
          'survey_phase',
          'fairness_q5',        // 修正2：Phase 2 感知公平性
          'threat_q6',          // 修正3：Phase 2 冤枉威脅感（操弄檢驗核心）
          'fairness_avg',       // 修正4：Phase 2 公平性平均
          // ── 階段彙總（每題都填，方便 SPSS 篩選）──
          'stage_adoption_rate',  // 修正5：本階段採納率（0–1）
          'stage_avg_rt_ms',      // 修正6：本階段平均反應時間（毫秒）
        ];

        const rows = [headers.join(',')];
        data.forEach(row => {
          let sd = {};
          try { sd = typeof row.survey_data === 'string' ? JSON.parse(row.survey_data) : (row.survey_data || {}); } catch(e) {}

          const line = [
            row.user_id,
            row.group_id        || '',
            row.direction       || '',
            directionCode[row.direction] ?? '',
            row.error_rate      ?? '',
            errorRateCode[row.error_rate] ?? '',      // 修正1
            row.stage,
            row.trial_number,
            row.stimulus_id,
            row.is_ai_generated ? 1 : 0,
            row.ai_label        || '',
            row.is_error_trial  ? 1 : 0,
            row.error_type      || '',
            row.user_choice     || '',
            row.agreed_with_ai  ? 1 : 0,
            row.is_correct      ? 1 : 0,
            ((row.response_time || 0) / 1000).toFixed(3),
            // 量表欄位
            sd.trust_q1    ?? '',
            sd.trust_q2    ?? '',
            sd.trust_q3    ?? '',
            sd.trust_q4    ?? '',
            sd.trust_avg   ?? '',
            sd.phase       ?? '',
            sd.fairness_q5 ?? '',                     // 修正2
            sd.threat_q6   ?? '',                     // 修正3
            sd.fairness_avg ?? '',                    // 修正4
            // 階段彙總
            getAdoptionRate(row.user_id, row.stage),  // 修正5
            getAvgRT(row.user_id, row.stage),         // 修正6
          ];
          rows.push(line.join(','));
        });

        triggerDownload(rows.join('\n'), 'spss_cleaned_data');
        updateStatus(`清洗成功！已匯出 ${data.length} 筆資料，共 ${headers.length} 個欄位。`, 'green');
      } catch (err) {
        updateStatus('清洗失敗：' + err.message, 'red');
      }
    }

    function triggerDownload(content, prefix) {
      const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href     = url;
      link.download = `${prefix}_${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    function updateStatus(msg, color) {
      const el = document.getElementById('status-msg');
      el.innerText = msg;
      el.className = 'mt-6 text-center text-sm font-medium py-3 rounded-lg block ';
      if (color === 'red')   el.classList.add('bg-red-50',    'text-red-700');
      if (color === 'blue')  el.classList.add('bg-blue-50',   'text-blue-700');
      if (color === 'green') el.classList.add('bg-green-50',  'text-green-700');
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
